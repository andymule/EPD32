; PlatformIO project configuration for the Atmo e-paper weather display.
; Target hardware: Lilygo T5 v2.2 (ESP32 + 2.9" b/w e-paper).
;
;   pio run                 -> debug build (serial logging on)
;   pio run -e release       -> release build (silent, smaller)
;   pio run -t upload        -> flash the default (debug) build

[platformio]
default_envs = debug

; Shared options inherited by every environment below.
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; The captive-portal web server + HTTPS + GxEPD2 do not fit the default app
; partition, so use the smaller-SPIFFS layout shipped with this repo.
board_build.partitions = min_spiffs.csv

lib_deps =
	zinggjm/GxEPD2
	adafruit/Adafruit GFX Library
	bblanchon/ArduinoJson
	paulstoffregen/Time

; Development build: serial logging enabled via DEBUG_BUILD.
[env:debug]
build_flags = -DDEBUG_BUILD

; Production build: no serial logging, slightly smaller and lower power.
[env:release]
build_flags =
