; PlatformIO project configuration for the Atmo e-paper weather display.
; Target hardware: Lilygo T5 v2.2 (ESP32 + 2.9" b/w e-paper).
;
;   pio run                 -> debug build (serial logging on)
;   pio run -e release       -> release build (silent, smaller)
;   pio run -t upload        -> flash the default (debug) build

[platformio]
default_envs = debug

; Shared options inherited by every environment below.
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; The captive-portal web server + HTTPS + GxEPD2 do not fit the default app
; partition, so use the smaller-SPIFFS layout shipped with this repo.
board_build.partitions = min_spiffs.csv

lib_deps =
	zinggjm/GxEPD2
	adafruit/Adafruit GFX Library
	bblanchon/ArduinoJson
	paulstoffregen/Time

; Development build: serial logging enabled via DEBUG_BUILD.
[env:debug]
build_flags = -DDEBUG_BUILD

; Production build: no serial logging, slightly smaller and lower power.
[env:release]
build_flags =

; ---------------------------------------------------------------------------
; Waveshare ESP32-S3-Touch-ePaper-1.54 (1.54" 200x200 B/W SPI, FT6336 touch).
; Module on this unit: ESP32-S3-PICO-1, 8MB quad flash + 8MB quad PSRAM,
; native USB-Serial/JTAG. PSRAM is intentionally left disabled -- the firmware
; never needed it (it ran on a PSRAM-less classic ESP32), and a mismatched
; PSRAM mode is a common boot-loop cause; enable later if a feature wants it.
;   pio run -e s3_touch -t upload   -> build + flash the S3 board
; ---------------------------------------------------------------------------
[env:s3_touch]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
build_flags =
	-DDEBUG_BUILD
	-DBOARD_WAVESHARE_S3_154_TOUCH
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

; Barebones panel bring-up test: bypasses the whole app and draws a fixed
; pattern (border, block, "HELLO") to isolate pins/driver/SPI from app logic.
;   pio run -e s3_test -t upload
[env:s3_test]
extends = env:s3_touch
build_flags =
	${env:s3_touch.build_flags}
	-DBAREBONES_EPD_TEST
